<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yeon Stock App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="max-w-4xl mx-auto p-6">
    <h1 class="text-3xl font-bold mb-6">Yeon Stock App</h1>

    <div class="bg-white shadow rounded-xl p-6 mb-6">
      <input id="checkerName" placeholder="ชื่อผู้เช็ค" class="border p-2 rounded w-full mb-4" />
      <button onclick="saveCheck()" class="bg-blue-500 text-white px-4 py-2 rounded">บันทึก</button>
    </div>

    <div class="bg-white shadow rounded-xl p-6">
      <h2 class="text-xl font-semibold mb-4">Stock Records</h2>
      <ul id="records" class="space-y-2"></ul>
    </div>
  </div>

  <script>
    const SCRIPT_URL = 'PASTE_YOUR_GOOGLE_APPS_SCRIPT_WEBAPP_URL_HERE';

    async function saveCheck() {
      const checkerName = document.getElementById('checkerName').value;
      if (!checkerName) return alert('กรุณาใส่ชื่อ');

      await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({
          checkerName,
          timestamp: new Date().toISOString()
        })
      });

      loadRecords();
    }

    async function loadRecords() {
      const res = await fetch(SCRIPT_URL);
      const data = await res.json();
      const list = document.getElementById('records');
      list.innerHTML = '';

      data.forEach(item => {
        const li = document.createElement('li');
        li.className = 'border p-2 rounded';
        li.textContent = `${item.checkerName} - ${item.timestamp}`;
        list.appendChild(li);
      });
    }

    loadRecords();
  </script>
</body>
</html>
